<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In &middot; nicart.space</title>
  <meta name="description" content="Sign in to your nicart.space workspace" />
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <style>
    :root {
      --bg: #0b1020;
      --surface: #131b2f;
      --surface-warm: #182343;
      --fg: #f8fafc;
      --fg-2: #cbd5e1;
      --muted: #8ea0b8;
      --border: #293653;
      --border-soft: #1e2a43;
      --accent: #60a5fa;
      --accent-on: #06111f;
      --accent-soft: color-mix(in oklch, #60a5fa 14%, transparent);
      --accent-hover: color-mix(in oklab, #60a5fa, black 8%);
      --success: #22c55e;

      --font-display: Inter, system-ui, sans-serif;
      --font-body: Inter, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;

      --radius: 10px;
      --radius-lg: 16px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 860px) {
      body { grid-template-columns: 1fr; }
      .login-visual { display: none; }
    }

    /* Left: Animated visual panel */
    .login-visual {
      position: relative; overflow: hidden;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
    }

    /* Gradient mesh background */
    .mesh-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, color-mix(in oklch, var(--accent) 20%, transparent), transparent),
        radial-gradient(ellipse 60% 80% at 80% 20%, color-mix(in oklch, var(--accent) 15%, transparent), transparent),
        radial-gradient(ellipse 50% 50% at 50% 50%, color-mix(in oklch, var(--accent) 8%, transparent), transparent);
      animation: meshShift 12s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.1) rotate(3deg); }
    }

    /* Floating geometric shapes */
    .shapes-container {
      position: absolute; inset: 0;
      overflow: hidden;
    }
    .geo-shape {
      position: absolute;
      border: 1.5px solid color-mix(in oklch, var(--accent) 40%, transparent);
      animation: geoFloat 10s ease-in-out infinite;
    }
    .geo-shape:nth-child(1) {
      width: 80px; height: 80px; border-radius: 50%;
      top: 15%; left: 20%;
      animation-duration: 8s;
    }
    .geo-shape:nth-child(2) {
      width: 60px; height: 60px;
      top: 60%; left: 60%;
      transform: rotate(45deg);
      animation-duration: 11s; animation-delay: -2s;
    }
    .geo-shape:nth-child(3) {
      width: 100px; height: 100px; border-radius: 50%;
      top: 70%; left: 15%;
      border-color: color-mix(in oklch, var(--accent) 30%, transparent);
      animation-duration: 14s; animation-delay: -4s;
    }
    .geo-shape:nth-child(4) {
      width: 50px; height: 50px;
      top: 25%; left: 70%;
      border-color: color-mix(in oklch, var(--success) 30%, transparent);
      animation-duration: 9s; animation-delay: -1s;
    }
    .geo-shape:nth-child(5) {
      width: 120px; height: 120px; border-radius: 50%;
      top: 40%; left: 40%;
      border-color: color-mix(in oklch, var(--accent) 25%, transparent);
      animation-duration: 16s; animation-delay: -6s;
    }
    .geo-shape:nth-child(6) {
      width: 40px; height: 40px;
      top: 80%; left: 75%;
      transform: rotate(30deg);
      animation-duration: 7s; animation-delay: -3s;
    }
    @keyframes geoFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0.6; }
      25% { transform: translate(20px, -30px) rotate(90deg); opacity: 1; }
      50% { transform: translate(-15px, 15px) rotate(180deg); opacity: 0.5; }
      75% { transform: translate(10px, 25px) rotate(270deg); opacity: 0.8; }
    }

    /* Grid overlay */
    .visual-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(to right, color-mix(in oklch, var(--border) 30%, transparent) 1px, transparent 1px),
        linear-gradient(to bottom, color-mix(in oklch, var(--border) 30%, transparent) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
    }

    /* Center logo on visual side */
    .visual-brand {
      position: relative; z-index: 2;
      text-align: center;
    }
    .visual-brand .logo-large {
      font-family: var(--font-display);
      font-size: 36px; font-weight: 700;
      letter-spacing: -0.03em;
      animation: logoReveal 1s cubic-bezier(0.2, 0, 0, 1) forwards;
      opacity: 0;
    }
    .visual-brand .logo-large span { color: var(--accent); }
    .visual-brand .tagline {
      font-size: 14px; color: var(--muted);
      margin-top: 12px;
      animation: logoReveal 1s cubic-bezier(0.2, 0, 0, 1) 0.3s forwards;
      opacity: 0;
    }
    @keyframes logoReveal {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Orbiting dots around brand */
    .orbit {
      position: absolute; width: 200px; height: 200px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      animation: orbitSpin 20s linear infinite;
    }
    .orbit-dot {
      position: absolute; width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
    }
    .orbit-dot:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
    .orbit-dot:nth-child(2) { bottom: 0; left: 50%; transform: translateX(-50%); }
    .orbit-dot:nth-child(3) { top: 50%; left: 0; transform: translateY(-50%); }
    .orbit-dot:nth-child(4) { top: 50%; right: 0; transform: translateY(-50%); }
    @keyframes orbitSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Right: Login form panel */
    .login-form-panel {
      display: flex; align-items: center; justify-content: center;
      padding: 48px 32px;
      position: relative;
    }
    .login-form-panel::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 40% 50% at 80% 20%, color-mix(in oklch, var(--accent) 5%, transparent), transparent);
    }

    .login-card {
      width: 100%; max-width: 380px;
      position: relative; z-index: 2;
    }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
      margin-bottom: 40px;
      transition: color 0.2s;
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 14px; height: 14px; }

    /* Form header */
    .form-header {
      margin-bottom: 32px;
    }
    .form-header h1 {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700;
      letter-spacing: -0.02em; margin: 0 0 8px;
    }
    .form-header p {
      color: var(--muted); font-size: 15px; margin: 0;
    }

    /* Social buttons */
    .social-btns {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 24px;
    }
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px; font-weight: 500; color: var(--fg);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
    }
    .social-btn:hover {
      border-color: var(--accent);
      background: var(--surface-warm);
      transform: translateY(-1px);
    }
    .social-btn:active { transform: translateY(0); }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 24px;
      color: var(--muted); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* Fields */
    .field {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 20px;
    }
    .field label {
      font-size: 13px; color: var(--muted); font-weight: 500;
    }
    .field input {
      width: 100%; padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg); font: inherit; font-size: 15px;
      transition: all 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 15%, transparent);
    }
    .field input::placeholder { color: var(--muted); opacity: 0.6; }

    /* Password field with toggle */
    .password-wrap {
      position: relative;
    }
    .password-wrap input { padding-right: 44px; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 4px; display: flex;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--accent); }
    .password-toggle svg { width: 18px; height: 18px; }

    /* Forgot link */
    .forgot-row {
      display: flex; justify-content: flex-end;
      margin-bottom: 24px;
    }
    .forgot-row a {
      font-size: 13px; color: var(--accent);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .forgot-row a:hover { opacity: 0.8; }

    /* Submit */
    .submit-btn {
      width: 100%; padding: 13px 20px;
      background: var(--accent); color: var(--accent-on);
      border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
      position: relative; overflow: hidden;
    }
    .submit-btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 24px color-mix(in oklch, var(--accent) 30%, transparent);
      transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }

    /* Ripple on submit */
    .submit-btn .ripple {
      position: absolute; border-radius: 50%;
      background: color-mix(in oklch, white 30%, transparent);
      transform: scale(0); animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Sign up footer */
    .signup-footer {
      text-align: center; margin-top: 28px;
      font-size: 14px; color: var(--muted);
    }
    .signup-footer a {
      color: var(--accent); font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .signup-footer a:hover { opacity: 0.8; }

    /* Stagger animations */
    .login-card > * {
      opacity: 0; animation: formFadeUp 0.6s cubic-bezier(0.2, 0, 0, 1) forwards;
    }
    .login-card > *:nth-child(1) { animation-delay: 0.1s; }
    .login-card > *:nth-child(2) { animation-delay: 0.2s; }
    .login-card > *:nth-child(3) { animation-delay: 0.3s; }
    .login-card > *:nth-child(4) { animation-delay: 0.4s; }
    .login-card > *:nth-child(5) { animation-delay: 0.5s; }
    .login-card > *:nth-child(6) { animation-delay: 0.6s; }
    .login-card > *:nth-child(7) { animation-delay: 0.7s; }
    .login-card > *:nth-child(8) { animation-delay: 0.8s; }
    .login-card > *:nth-child(9) { animation-delay: 0.9s; }
    @keyframes formFadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Focus pulse ring on active field */
    @keyframes focusPulse {
      0% { box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 15%, transparent); }
      50% { box-shadow: 0 0 0 5px color-mix(in oklch, var(--accent) 8%, transparent); }
      100% { box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 15%, transparent); }
    }
    .field input:focus {
      animation: focusPulse 2s ease-in-out infinite;
    }

    /* Loading state */
    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.85;
    }
    .submit-btn.loading::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, color-mix(in oklch, white 15%, transparent), transparent);
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    /* Success state */
    .submit-btn.success {
      background: var(--success);
      pointer-events: none;
    }

    /* Toast notification */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 24px;
      font-size: 14px; color: var(--fg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1);
      display: flex; align-items: center; gap: 10px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: #fb7185; }
    .toast.success { border-color: var(--success); }

    /* Form validation styles */
    .field input.error {
      border-color: #fb7185;
      box-shadow: 0 0 0 3px color-mix(in oklch, #fb7185 15%, transparent);
      animation: none;
    }
    .field .error-msg {
      font-size: 12px; color: #fb7185; margin-top: 4px;
      display: none;
    }
    .field .error-msg.show { display: block; }
  </style>
</head>
<body>
  <!-- Left: Animated visual panel -->
  <div class="login-visual">
    <div class="visual-grid"></div>
    <div class="mesh-bg"></div>
    <div class="shapes-container">
      <div class="geo-shape"></div>
      <div class="geo-shape"></div>
      <div class="geo-shape"></div>
      <div class="geo-shape"></div>
      <div class="geo-shape"></div>
      <div class="geo-shape"></div>
    </div>
    <div class="visual-brand">
      <div class="orbit">
        <div class="orbit-dot"></div>
        <div class="orbit-dot"></div>
        <div class="orbit-dot"></div>
        <div class="orbit-dot"></div>
      </div>
      <div class="logo-large">nicart<span>.</span>space</div>
      <p class="tagline">Build. Deploy. Create.</p>
    </div>
  </div>

  <!-- Right: Login form -->
  <div class="login-form-panel">
    <div class="login-card">
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to home
      </a>

      <div class="form-header">
        <h1>Welcome back</h1>
        <p>Sign in to your workspace</p>
      </div>

      <div class="social-btns">
        <button class="social-btn" type="button" id="googleBtn">
          <svg viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" opacity="0.8"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" opacity="0.6"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" opacity="0.4"/></svg>
          Google
        </button>
        <button class="social-btn" type="button" id="githubBtn">
          <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          GitHub
        </button>
      </div>

      <div class="divider">or continue with email</div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
          <span class="error-msg" id="emailError">Please enter a valid email address</span>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" minlength="6" />
            <button type="button" class="password-toggle" aria-label="Toggle password visibility" id="togglePw">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="error-msg" id="passwordError">Password must be at least 6 characters</span>
        </div>

        <div class="forgot-row">
          <a href="#" id="forgotLink">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
      </form>

      <p class="signup-footer">
        Don't have an account? <a href="#" id="signupLink">Create one</a>
      </p>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
    // Utility: Show toast notification
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Email validation
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // Password toggle
    const toggleBtn = document.getElementById('togglePw');
    const pwInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    let pwVisible = false;

    toggleBtn.addEventListener('click', () => {
      pwVisible = !pwVisible;
      pwInput.type = pwVisible ? 'text' : 'password';
      eyeIcon.innerHTML = pwVisible
        ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.6" fill="none"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    // Ripple effect on submit button
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });

    // Form validation and submission
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');

    // Clear validation errors on input
    emailInput.addEventListener('input', () => {
      emailInput.classList.remove('error');
      emailError.classList.remove('show');
    });

    pwInput.addEventListener('input', () => {
      pwInput.classList.remove('error');
      passwordError.classList.remove('show');
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      // Validate
      let valid = true;

      if (!isValidEmail(emailInput.value)) {
        emailInput.classList.add('error');
        emailError.classList.add('show');
        valid = false;
      }

      if (pwInput.value.length < 6) {
        pwInput.classList.add('error');
        passwordError.classList.add('show');
        valid = false;
      }

      if (!valid) {
        showToast('Please fix the errors above', 'error');
        return;
      }

      // Simulate sign-in
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'Signing in...';

      setTimeout(() => {
        submitBtn.classList.remove('loading');
        submitBtn.classList.add('success');
        submitBtn.textContent = 'Welcome!';
        showToast('Signed in successfully!', 'success');

        // Redirect to home after success
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      }, 2000);
    });

    // Social button clicks
    document.getElementById('googleBtn').addEventListener('click', () => {
      showToast('Google sign-in coming soon!', 'info');
    });

    document.getElementById('githubBtn').addEventListener('click', () => {
      showToast('GitHub sign-in coming soon!', 'info');
    });

    // Forgot password
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Password reset link sent to your email', 'success');
    });

    // Sign up link
    document.getElementById('signupLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Sign up page coming soon!', 'info');
    });

    // Interactive parallax on visual panel (mouse-based)
    const visual = document.querySelector('.login-visual');
    if (visual) {
      visual.addEventListener('mousemove', (e) => {
        const rect = visual.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        const shapes = visual.querySelectorAll('.geo-shape');
        shapes.forEach((shape, i) => {
          const depth = (i + 1) * 8;
          shape.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
        });
      });
    }

    // Keyboard accessibility: Enter key on social buttons
    document.querySelectorAll('.social-btn').forEach(btn => {
      btn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          btn.click();
        }
      });
    });
  </script>
</body>
</html>
